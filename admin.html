<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Blog Letícia Rufino</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --heading:'Playfair Display',Georgia,serif;
  --body:'Outfit',system-ui,sans-serif;
  --black:#0a0a09;--bg:#f5f3ef;--cream:#edeae4;--warm:#e4e0d8;
  --grey:#8f8a82;--light:#b5b0a8;--accent:#c9a96e;--red:#c96e6e;
  --ease:cubic-bezier(.22,1,.36,1);
  --sidebar:240px;
}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--body);background:var(--bg);color:var(--black);font-size:14px;min-height:100vh}
a{text-decoration:none;color:inherit}
button{border:none;cursor:pointer;font-family:var(--body)}
input,textarea,select{font-family:var(--body)}

/* ═══ LOGIN ═══ */
#loginScreen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:var(--black);
}
.login-box{
  background:var(--cream);border-radius:8px;
  padding:44px 40px;width:360px;text-align:center;
}
.login-logo{
  font-family:var(--heading);font-size:22px;font-weight:400;
  margin-bottom:6px;
}
.login-sub{font-size:12px;color:var(--grey);margin-bottom:28px}
.login-field{
  display:flex;flex-direction:column;gap:6px;margin-bottom:14px;text-align:left;
}
.login-field label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--grey)}
.login-field input{
  padding:12px 14px;border-radius:6px;
  border:1px solid rgba(0,0,0,.1);
  background:#fff;font-size:14px;outline:none;
  transition:border-color .3s;
}
.login-field input:focus{border-color:var(--accent)}
.login-btn{
  width:100%;padding:14px;border-radius:60px;
  background:var(--black);color:#fff;
  font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  margin-top:8px;transition:opacity .3s;
}
.login-btn:hover{opacity:.8}
.login-err{font-size:12px;color:var(--red);margin-top:10px;display:none}

/* ═══ LAYOUT ADMIN ═══ */
#adminApp{display:none}
.admin-layout{display:flex;min-height:100vh}

/* ─ Sidebar ─ */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--black);
  display:flex;flex-direction:column;
  padding:28px 0;
  position:fixed;top:0;left:0;height:100vh;z-index:10;
}
.sidebar-brand{
  padding:0 22px 24px;
  border-bottom:1px solid rgba(255,255,255,.05);
  margin-bottom:16px;
}
.sidebar-brand-name{
  font-family:var(--heading);font-size:15px;font-weight:400;color:#fff;line-height:1.2;
}
.sidebar-brand-tag{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 12px;flex:1}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:6px;
  font-size:13px;font-weight:500;color:rgba(255,255,255,.4);
  cursor:pointer;transition:all .25s;
}
.nav-item:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.8)}
.nav-item.active{background:rgba(201,169,110,.12);color:var(--accent)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8}
.sidebar-footer{padding:16px 22px 0;border-top:1px solid rgba(255,255,255,.05);margin-top:auto}
.logout-btn{
  font-size:11px;color:rgba(255,255,255,.2);
  letter-spacing:.04em;cursor:pointer;
  transition:color .3s;background:none;
}
.logout-btn:hover{color:rgba(255,255,255,.6)}

/* ─ Main ─ */
.admin-main{
  margin-left:var(--sidebar);flex:1;
  padding:32px 36px;min-height:100vh;
}
.admin-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;padding-bottom:20px;
  border-bottom:1px solid rgba(0,0,0,.07);
  flex-wrap:wrap;gap:12px;
}
.admin-title{font-family:var(--heading);font-size:24px;font-weight:400}
.admin-title em{font-style:italic}

/* ─ Botões ─ */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 22px;border-radius:60px;
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;transition:all .25s;border:none;
}
.btn-dark{background:var(--black);color:#fff}
.btn-dark:hover{opacity:.8}
.btn-accent{background:var(--accent);color:var(--black)}
.btn-accent:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid rgba(0,0,0,.12);color:var(--black)}
.btn-outline:hover{border-color:var(--black)}
.btn-red{background:transparent;border:1px solid rgba(201,110,110,.25);color:var(--red)}
.btn-red:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:7px 16px;font-size:10px}

/* ─ Cards de stat ─ */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat-card{
  background:var(--cream);border-radius:6px;
  padding:20px 20px 18px;
}
.stat-n{font-family:var(--heading);font-size:32px;font-weight:400;line-height:1}
.stat-l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-top:6px}

/* ─ Tabela de posts ─ */
.table-wrap{background:var(--cream);border-radius:6px;overflow:hidden}
.table-toolbar{
  display:flex;align-items:center;gap:10px;padding:16px 18px;
  border-bottom:1px solid rgba(0,0,0,.05);flex-wrap:wrap;
}
.table-search{
  flex:1;min-width:160px;padding:8px 14px;border-radius:6px;
  border:1px solid rgba(0,0,0,.08);font-size:13px;
  background:#fff;outline:none;transition:border-color .3s;
}
.table-search:focus{border-color:var(--accent)}
.filter-select{
  padding:8px 12px;border-radius:6px;border:1px solid rgba(0,0,0,.08);
  font-size:12px;background:#fff;outline:none;cursor:pointer;color:var(--black);
}
table{width:100%;border-collapse:collapse}
th{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--grey);text-align:left;padding:12px 18px;
  border-bottom:1px solid rgba(0,0,0,.06);
}
td{padding:13px 18px;border-bottom:1px solid rgba(0,0,0,.04);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,0,0,.015)}
.post-title-cell{
  font-weight:500;max-width:260px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.badge{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:60px;
  font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
}
.badge-pub{background:rgba(110,201,158,.15);color:#3a8a63}
.badge-draft{background:rgba(0,0,0,.06);color:var(--grey)}
.badge-feat{background:rgba(201,169,110,.15);color:#9a7840}
.td-actions{display:flex;gap:6px;align-items:center}
.pagination{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:16px;border-top:1px solid rgba(0,0,0,.05);
}
.pg-btn{
  width:32px;height:32px;border-radius:6px;border:1px solid rgba(0,0,0,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;cursor:pointer;background:#fff;transition:all .2s;
}
.pg-btn:hover,.pg-btn.active{background:var(--black);color:#fff;border-color:var(--black)}
.pg-btn:disabled{opacity:.35;cursor:default}

/* ─ Modal / drawer de edição ─ */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.5);
  display:none;align-items:flex-start;justify-content:flex-end;
}
.modal-overlay.open{display:flex}
.drawer{
  width:min(680px,100vw);height:100vh;
  background:var(--bg);
  overflow-y:auto;
  padding:36px 36px 60px;
  animation:slideIn .35s var(--ease);
}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;
}
.drawer-title{font-family:var(--heading);font-size:20px;font-weight:400}
.close-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid rgba(0,0,0,.1);background:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .2s;
}
.close-btn:hover{background:var(--warm)}
.close-btn svg{width:14px;height:14px;stroke:var(--black);fill:none;stroke-width:2}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
.form-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--grey)}
.form-input,.form-select,.form-textarea{
  padding:11px 14px;border-radius:6px;
  border:1px solid rgba(0,0,0,.1);
  background:#fff;font-size:14px;outline:none;
  transition:border-color .3s;color:var(--black);width:100%;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:120px;line-height:1.7}
.form-textarea.content{min-height:260px;font-family:var(--body)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-check{display:flex;align-items:center;gap:8px;cursor:pointer}
.form-check input{width:16px;height:16px;accent-color:var(--accent)}
.form-check span{font-size:13px;color:var(--black)}
.cover-preview{
  width:100%;aspect-ratio:16/9;border-radius:6px;overflow:hidden;
  background:var(--warm);display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--grey);margin-bottom:8px;
  position:relative;
}
.cover-preview img{width:100%;height:100%;object-fit:cover;display:none}
.cover-preview.has-img img{display:block}
.cover-preview.has-img .cover-placeholder{display:none}
.drawer-footer{
  display:flex;align-items:center;gap:12px;
  margin-top:28px;padding-top:20px;
  border-top:1px solid rgba(0,0,0,.07);
  flex-wrap:wrap;
}

/* ─ Newsletter tab ─ */
.email-list{background:var(--cream);border-radius:6px;overflow:hidden}
.email-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;border-bottom:1px solid rgba(0,0,0,.04);
  font-size:13px;
}
.email-item:last-child{border-bottom:none}
.email-date{font-size:11px;color:var(--grey)}
.tab-content{display:none}
.tab-content.active{display:block}

/* ─ Toast ─ */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:200;
  background:var(--black);color:#fff;
  padding:12px 20px;border-radius:8px;
  font-size:13px;opacity:0;
  transform:translateY(8px);
  transition:opacity .3s,transform .3s;
  pointer-events:none;
}
.toast.show{opacity:1;transform:none}
.toast.error{background:var(--red)}

@media(max-width:900px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .admin-main{padding:20px 18px}
}
@media(max-width:640px){
  .sidebar{transform:translateX(-100%);transition:transform .35s var(--ease)}
  .sidebar.open{transform:translateX(0)}
  .admin-main{margin-left:0}
  .stats-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ════ LOGIN ════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Letícia Rufino</div>
    <div class="login-sub">Painel do Blog</div>
    <div class="login-field">
      <label>E-mail</label>
      <input id="loginEmail" type="email" placeholder="admin@leticia.com" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn">Entrar</button>
    <div class="login-err" id="loginErr">E-mail ou senha incorretos.</div>
  </div>
</div>

<!-- ════ APP ADMIN ════ -->
<div id="adminApp">
  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-name">Letícia Rufino</div>
        <div class="sidebar-brand-tag">Blog Admin</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-tab="posts">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Posts
        </div>
        <div class="nav-item" data-tab="newsletter">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Newsletter
        </div>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">Sair da conta</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="admin-main">

      <!-- ─ TAB POSTS ─ -->
      <div class="tab-content active" id="tabPosts">
        <div class="admin-header">
          <h1 class="admin-title">Posts do <em>blog</em></h1>
          <button class="btn btn-accent" id="newPostBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Novo post
          </button>
        </div>

        <div class="stats-grid" id="statsGrid">
          <div class="stat-card"><div class="stat-n" id="statTotal">—</div><div class="stat-l">Total de posts</div></div>
          <div class="stat-card"><div class="stat-n" id="statPublished">—</div><div class="stat-l">Publicados</div></div>
          <div class="stat-card"><div class="stat-n" id="statDraft">—</div><div class="stat-l">Rascunhos</div></div>
          <div class="stat-card"><div class="stat-n" id="statFeatured">—</div><div class="stat-l">Em destaque</div></div>
        </div>

        <div class="table-wrap">
          <div class="table-toolbar">
            <input class="table-search" id="searchInput" placeholder="Buscar posts…" type="search">
            <select class="filter-select" id="statusFilter">
              <option value="">Todos os status</option>
              <option value="published">Publicados</option>
              <option value="draft">Rascunhos</option>
            </select>
            <select class="filter-select" id="catFilter">
              <option value="">Todas as categorias</option>
            </select>
          </div>
          <table>
            <thead>
              <tr>
                <th>Título</th>
                <th>Categoria</th>
                <th>Status</th>
                <th>Data</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="postsTableBody"></tbody>
          </table>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>

      <!-- ─ TAB NEWSLETTER ─ -->
      <div class="tab-content" id="tabNewsletter">
        <div class="admin-header">
          <h1 class="admin-title">Newsletter</h1>
          <button class="btn btn-outline btn-sm" id="exportNewsletterBtn">Exportar CSV</button>
        </div>
        <div class="email-list" id="emailList"><div style="padding:24px;text-align:center;color:var(--grey)">Carregando…</div></div>
      </div>

    </main>
  </div>
</div>

<!-- ════ DRAWER DE EDIÇÃO ════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="drawer">
    <div class="drawer-header">
      <h2 class="drawer-title" id="drawerTitle">Novo post</h2>
      <button class="close-btn" id="closeDrawerBtn">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">Título *</label>
      <input class="form-input" id="fTitle" placeholder="Título do artigo">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <select class="form-select" id="fCategory"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="fStatus">
          <option value="draft">Rascunho</option>
          <option value="published">Publicado</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Imagem de capa</label>
      <div class="cover-preview" id="coverPreview">
        <span class="cover-placeholder">Sem imagem</span>
        <img id="coverImg" src="" alt="">
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <label class="btn btn-outline btn-sm" style="cursor:pointer">
          Upload
          <input type="file" id="coverUpload" accept="image/*" style="display:none">
        </label>
        <input class="form-input" id="fCoverUrl" placeholder="Ou cole a URL da imagem" style="flex:1;min-width:180px">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Resumo / Excerpt</label>
      <textarea class="form-textarea" id="fExcerpt" placeholder="Breve descrição que aparece na listagem…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Conteúdo completo</label>
      <textarea class="form-textarea content" id="fContent" placeholder="Escreva o artigo aqui. Suporta HTML básico: &lt;h2&gt;, &lt;p&gt;, &lt;strong&gt;, &lt;em&gt;, &lt;ul&gt;, &lt;li&gt;…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Tempo de leitura (min)</label>
        <input class="form-input" id="fReadTime" type="number" min="1" max="60" value="5">
      </div>
      <div class="form-group" style="justify-content:flex-end;padding-top:22px">
        <label class="form-check">
          <input type="checkbox" id="fFeatured">
          <span>Destacar na home do blog</span>
        </label>
      </div>
    </div>

    <div class="drawer-footer">
      <button class="btn btn-dark" id="savePostBtn">Salvar post</button>
      <button class="btn btn-outline" id="cancelDrawerBtn">Cancelar</button>
      <button class="btn btn-red btn-sm" id="deletePostBtn" style="margin-left:auto;display:none">Excluir</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
'use strict';

const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3001'
  : '';

let token = localStorage.getItem('lr_token') || '';
let currentPage = 1;
let editingId = null;
let categories = [];
let allPosts = [];

/* ─── helpers ─── */
const $ = id => document.getElementById(id);
function toast(msg, err = false) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2800);
}
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token, ...(opts.headers || {}) }
  });
  if (res.status === 401) { logout(); throw new Error('Não autorizado'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Erro na API');
  return data;
}
function fmtDate(str) {
  return new Date(str).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
}

/* ─── Auth ─── */
function login(t) { token = t; localStorage.setItem('lr_token', t); $('loginScreen').style.display = 'none'; $('adminApp').style.display = 'block'; init(); }
function logout() { token = ''; localStorage.removeItem('lr_token'); $('adminApp').style.display = 'none'; $('loginScreen').style.display = 'flex'; }

$('loginBtn').addEventListener('click', async () => {
  const email = $('loginEmail').value, pass = $('loginPass').value;
  try {
    const data = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password: pass }) });
    $('loginErr').style.display = 'none';
    login(data.token);
  } catch { $('loginErr').style.display = 'block'; }
});
['loginEmail','loginPass'].forEach(id => $(id).addEventListener('keydown', e => e.key === 'Enter' && $('loginBtn').click()));
$('logoutBtn').addEventListener('click', logout);
if (token) { $('loginScreen').style.display = 'none'; $('adminApp').style.display = 'block'; }

/* ─── Tabs ─── */
document.querySelectorAll('.nav-item[data-tab]').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    item.classList.add('active');
    $('tab' + item.dataset.tab.charAt(0).toUpperCase() + item.dataset.tab.slice(1)).classList.add('active');
    if (item.dataset.tab === 'newsletter') loadNewsletter();
  });
});

/* ─── Init ─── */
async function init() {
  await loadCategories();
  await loadPosts();
}

/* ─── Categorias ─── */
async function loadCategories() {
  categories = await api('/api/categories');
  const sel = $('catFilter');
  sel.innerHTML = '<option value="">Todas as categorias</option>';
  categories.forEach(c => sel.innerHTML += `<option value="${c.slug}">${c.name}</option>`);
  const fCat = $('fCategory');
  fCat.innerHTML = '<option value="">Sem categoria</option>';
  categories.forEach(c => fCat.innerHTML += `<option value="${c.id}">${c.name}</option>`);
}

/* ─── Posts ─── */
async function loadPosts() {
  const status = $('statusFilter').value;
  const search = $('searchInput').value;
  try {
    const data = await api(`/api/admin/posts?page=${currentPage}&limit=12${status ? '&status='+status : ''}`);
    allPosts = data.posts;
    renderStats(data);
    renderTable(allPosts.filter(p => !search || p.title.toLowerCase().includes(search.toLowerCase())));
    renderPagination(data);
  } catch(e) { toast(e.message, true); }
}

function renderStats(data) {
  $('statTotal').textContent = data.total;
  const pub = allPosts.filter(p => p.status === 'published').length;
  const dft = allPosts.filter(p => p.status === 'draft').length;
  const feat = allPosts.filter(p => p.featured).length;
  $('statPublished').textContent = pub;
  $('statDraft').textContent = dft;
  $('statFeatured').textContent = feat;
}

function renderTable(posts) {
  const tbody = $('postsTableBody');
  if (!posts.length) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--grey)">Nenhum post encontrado.</td></tr>'; return; }
  tbody.innerHTML = posts.map(p => `
    <tr>
      <td>
        <div class="post-title-cell">${p.title}</div>
        ${p.featured ? '<span class="badge badge-feat" style="margin-top:4px">Destaque</span>' : ''}
      </td>
      <td style="color:var(--grey)">${p.category_name || '—'}</td>
      <td><span class="badge ${p.status === 'published' ? 'badge-pub' : 'badge-draft'}">${p.status === 'published' ? 'Publicado' : 'Rascunho'}</span></td>
      <td style="color:var(--grey);white-space:nowrap">${fmtDate(p.created_at)}</td>
      <td><div class="td-actions">
        <button class="btn btn-outline btn-sm" onclick="openEditor(${p.id})">Editar</button>
      </div></td>
    </tr>
  `).join('');
}

function renderPagination(data) {
  const pg = $('pagination');
  if (data.pages <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="pg-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage-1})">‹</button>`;
  for (let i = 1; i <= data.pages; i++) html += `<button class="pg-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  html += `<button class="pg-btn" ${currentPage === data.pages ? 'disabled' : ''} onclick="goPage(${currentPage+1})">›</button>`;
  pg.innerHTML = html;
}

function goPage(p) { currentPage = p; loadPosts(); }

$('searchInput').addEventListener('input', () => {
  const q = $('searchInput').value.toLowerCase();
  renderTable(allPosts.filter(p => p.title.toLowerCase().includes(q)));
});
$('statusFilter').addEventListener('change', () => { currentPage = 1; loadPosts(); });
$('catFilter').addEventListener('change', () => { currentPage = 1; loadPosts(); });

/* ─── Drawer ─── */
function openDrawer() { $('modalOverlay').classList.add('open'); }
function closeDrawer() { $('modalOverlay').classList.remove('open'); editingId = null; }

$('closeDrawerBtn').addEventListener('click', closeDrawer);
$('cancelDrawerBtn').addEventListener('click', closeDrawer);
$('modalOverlay').addEventListener('click', e => { if (e.target === $('modalOverlay')) closeDrawer(); });

$('newPostBtn').addEventListener('click', () => {
  editingId = null;
  $('drawerTitle').textContent = 'Novo post';
  $('fTitle').value = '';
  $('fExcerpt').value = '';
  $('fContent').value = '';
  $('fCoverUrl').value = '';
  $('fReadTime').value = 5;
  $('fFeatured').checked = false;
  $('fStatus').value = 'draft';
  $('fCategory').value = '';
  setCoverPreview('');
  $('deletePostBtn').style.display = 'none';
  openDrawer();
});

async function openEditor(id) {
  editingId = id;
  const post = await api(`/api/admin/posts/${id}`);
  $('drawerTitle').textContent = 'Editar post';
  $('fTitle').value = post.title || '';
  $('fExcerpt').value = post.excerpt || '';
  $('fReadTime').value = post.read_time || 5;
  $('fFeatured').checked = !!post.featured;
  $('fStatus').value = post.status || 'draft';
  $('fContent').value = post.content || '';
  $('fCoverUrl').value = post.cover_url || '';
  setCoverPreview(post.cover_url || '');
  $('fCategory').value = post.category_id || '';
  $('deletePostBtn').style.display = 'inline-flex';
  openDrawer();
}

/* capa */
function setCoverPreview(url) {
  const wrap = $('coverPreview'), img = $('coverImg');
  if (url) { img.src = url; wrap.classList.add('has-img'); }
  else { img.src = ''; wrap.classList.remove('has-img'); }
}
$('fCoverUrl').addEventListener('input', () => setCoverPreview($('fCoverUrl').value));
$('coverUpload').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  const fd = new FormData(); fd.append('image', file);
  try {
    const res = await fetch(API + '/api/admin/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: fd });
    const data = await res.json();
    $('fCoverUrl').value = API + data.url;
    setCoverPreview(API + data.url);
    toast('Imagem enviada!');
  } catch { toast('Falha no upload', true); }
});

/* salvar */
$('savePostBtn').addEventListener('click', async () => {
  const title = $('fTitle').value.trim();
  if (!title) { toast('Título é obrigatório', true); return; }
  const body = {
    title,
    excerpt: $('fExcerpt').value.trim(),
    content: $('fContent').value.trim(),
    cover_url: $('fCoverUrl').value.trim(),
    category_id: $('fCategory').value || null,
    status: $('fStatus').value,
    featured: $('fFeatured').checked,
    read_time: Number($('fReadTime').value) || 5
  };
  try {
    if (editingId) await api(`/api/admin/posts/${editingId}`, { method: 'PUT', body: JSON.stringify(body) });
    else await api('/api/admin/posts', { method: 'POST', body: JSON.stringify(body) });
    toast(editingId ? 'Post atualizado!' : 'Post criado!');
    closeDrawer();
    loadPosts();
  } catch(e) { toast(e.message, true); }
});

/* excluir */
$('deletePostBtn').addEventListener('click', async () => {
  if (!editingId || !confirm('Excluir este post permanentemente?')) return;
  try {
    await api(`/api/admin/posts/${editingId}`, { method: 'DELETE' });
    toast('Post excluído');
    closeDrawer();
    loadPosts();
  } catch(e) { toast(e.message, true); }
});

/* ─── Newsletter ─── */
async function loadNewsletter() {
  const list = $('emailList');
  list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--grey)">Carregando…</div>';
  try {
    const rows = await api('/api/admin/newsletter');
    if (!rows.length) { list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--grey)">Nenhum e-mail cadastrado ainda.</div>'; return; }
    list.innerHTML = rows.map(r => `
      <div class="email-item">
        <span>${r.email}</span>
        <span class="email-date">${fmtDate(r.created_at)}</span>
      </div>
    `).join('');
    $('exportNewsletterBtn').onclick = () => {
      const csv = 'email,data\n' + rows.map(r => `${r.email},${r.created_at}`).join('\n');
      const a = document.createElement('a');
      a.href = 'data:text/csv,' + encodeURIComponent(csv);
      a.download = 'newsletter.csv';
      a.click();
    };
  } catch(e) { list.innerHTML = `<div style="padding:24px;color:var(--red)">${e.message}</div>`; }
}

/* ─── Boot ─── */
if (token) init();
</script>
</body>
</html>
